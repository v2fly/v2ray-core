syntax = "proto3";

package v2ray.core.transport.internet.hysteria2;
option csharp_namespace = "V2Ray.Core.Transport.Internet.Hysteria2";
option go_package = "github.com/v2fly/v2ray-core/v5/transport/internet/hysteria2";
option java_package = "com.v2ray.core.transport.internet.hysteria2";
option java_multiple_files = true;

import "common/protoext/extensions.proto";

message UdpHop{
  repeated uint32 ports = 1;
  uint32 interval_min = 2;
  uint32 interval_max = 3;
}

message Config {
  option (v2ray.core.common.protoext.message_opt).type = "transport";
  option (v2ray.core.common.protoext.message_opt).short_name = "hysteria2";

  string auth = 1;
  UdpHop udp_hop = 2;
  optional string salamander = 3;
  string congestion = 4;
  string bbr_profile = 5;
  uint64 brutal_tx_mbps = 6;
  uint64 brutal_rx_mbps = 7;

  uint64 InitialStreamReceiveWindow = 8;
  uint64 MaxStreamReceiveWindow = 9;
  uint64 InitialConnectionReceiveWindow = 10;
  uint64 MaxConnectionReceiveWindow = 11;
  int64 MaxIdleTimeout = 12;
  int64 KeepAlivePeriod = 13;
  bool DisablePathMTUDiscovery = 14;
  int64 MaxIncomingStreams = 15;
}
