syntax = "proto3";

package v2ray.core.transport.internet.hysteria2;
option csharp_namespace = "V2Ray.Core.Transport.Internet.Hysteria2";
option go_package = "github.com/v2fly/v2ray-core/v5/transport/internet/hysteria2";
option java_package = "com.v2ray.core.transport.internet.hysteria2";
option java_multiple_files = true;

import "common/protoext/extensions.proto";

message UdpHop {
  repeated uint32 ports = 1;
  uint32 interval_min = 2;
  uint32 interval_max = 3;
}

message Realm {
  string scheme = 1;
  string host = 2;
  string port = 3;
  string token = 4;
  string ID = 5;
  repeated string stun_servers = 6;
}

message Config {
  option (v2ray.core.common.protoext.message_opt).type = "transport";
  option (v2ray.core.common.protoext.message_opt).short_name = "hysteria2";

  UdpHop udp_hop = 1;
  Realm realm = 2;
  string salamander = 3;

  string auth = 4;
  string congestion = 5;
  string bbr_profile = 6;
  uint64 brutal_tx_mbps = 7;
  uint64 brutal_rx_mbps = 8;

  uint64 InitialStreamReceiveWindow = 9;
  uint64 MaxStreamReceiveWindow = 10;
  uint64 InitialConnectionReceiveWindow = 11;
  uint64 MaxConnectionReceiveWindow = 12;
  int64 MaxIdleTimeout = 13;
  int64 KeepAlivePeriod = 14;
  bool DisablePathMTUDiscovery = 15;
  int64 MaxIncomingStreams = 16;
}
